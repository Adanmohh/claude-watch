name: ClaudeWatch
options:
  bundleIdPrefix: fi.neogrant
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ONLY_ACTIVE_ARCH: true
    DEVELOPMENT_TEAM: W25WJD2YZW
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ClaudeWatch:
    type: application
    platform: iOS
    sources:
      - path: "ClaudeWatch iOS"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.neogrant.claudewatch
        INFOPLIST_FILE: "ClaudeWatch iOS/Info.plist"
        PRODUCT_NAME: ClaudeWatch
        GENERATE_INFOPLIST_FILE: false
        DEVELOPMENT_TEAM: W25WJD2YZW
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore fi.neogrant.claudewatch"
    dependencies:
      - target: ClaudeWatchWatch
        embed: true

  ClaudeWatchWatch:
    type: application
    platform: watchOS
    sources:
      - path: "ClaudeWatch watchOS"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.neogrant.claudewatch.watchkitapp
        INFOPLIST_FILE: "ClaudeWatch watchOS/Info.plist"
        PRODUCT_NAME: ClaudeWatch
        GENERATE_INFOPLIST_FILE: false
        SUPPORTS_MACCATALYST: false
        DEVELOPMENT_TEAM: W25WJD2YZW
        ARCHS: "arm64 arm64e arm64_32"
        "EXCLUDED_ARCHS[sdk=watchsimulator*]": arm64e
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore fi.neogrant.claudewatch.watchkitapp"

schemes:
  ClaudeWatch:
    build:
      targets:
        ClaudeWatch: all
        ClaudeWatchWatch: all
    run:
      config: Debug
  ClaudeWatchWatch:
    build:
      targets:
        ClaudeWatchWatch: all
    run:
      config: Debug
      executable: ClaudeWatchWatch
